networks:
  ecomm-app-network:
    driver: bridge
    external: true

services:
  proxy:
    build: ./infra/nginx
    container_name: proxy
    ports:
      - "80:80"
    networks:
      - ecomm-app-network
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/active_color.conf:/etc/nginx/active_color.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s


volumes:
  jenkins_main: