- name: Install Grafana Repo
  copy:
    dest: /etc/yum.repos.d/grafana.repo
    content: |
      [grafana]
      name=Grafana
      enabled=1
      baseurl=https://packages.grafana.com/oss/rpm
      repo_gpgcheck=1
      gpgcheck=1
      gpgkey=https://packages.grafana.com/gpg.key


- name: Install Grafana
  yum:
    name: grafana
    state: present


- name: Start Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes